name: food_delivery
description: Food Delivery App with MVVM, Riverpod, built_value, SQLite

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable Models
  built_value: ^8.9.2
  built_collection: ^5.1.1

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.5.4
  built_value_generator: ^8.9.2
  riverpod_generator: ^2.6.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true