name: food_delivery
description: Food Delivery App with MVVM, Riverpod, built_value, SQLite

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Immutable Models
  built_value: ^8.10.1
  built_collection: ^5.1.1

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Serialization
  built_value_generator: ^8.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.5.4
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
